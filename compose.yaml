services:

  ###############################################################################
  # Linky collector — MQTT mode (Zigbee2MQTT / ZLinky_TIC)
  # Start with: docker compose --profile mqtt up -d
  linky2db-mqtt:
    container_name: linky2db
    build: .
    env_file: .env
    restart: always
    mem_limit: 128m
    profiles: [mqtt]
    environment:
      - LINKY_SOURCE=mqtt
    depends_on:
      mysql:
        condition: service_healthy

  ###############################################################################
  # Linky collector — USB mode (TIC dongle direct)
  # Start with: docker compose --profile usb up -d
  linky2db-usb:
    container_name: linky2db
    build: .
    env_file: .env
    restart: always
    mem_limit: 128m
    profiles: [usb]
    environment:
      - LINKY_SOURCE=usb
    devices:
      - ${LINKY_USB_DEVICE}:${LINKY_USB_DEVICE}
    depends_on:
      mysql:
        condition: service_healthy

  ###############################################################################
  # MySQL Database
  mysql:
    container_name: mysql
    image: mysql:8.4
    env_file: .env
    restart: always
    command: >
      mysqld --skip-performance-schema
             --skip-mysqlx
             --skip-name-resolve
             --default-storage-engine=InnoDB
             --innodb-buffer-pool-size=128M
             --innodb-buffer-pool-instances=1
             --innodb-flush-log-at-trx-commit=2
             --innodb-doublewrite=0
             --innodb-stats-on-metadata=0
             --character-set-server=utf8mb4
             --collation-server=utf8mb4_unicode_ci
             --init-connect='SET NAMES UTF8;'
             --lc_time_names='fr_FR'
             --mysql_native_password=ON
    mem_limit: 512m
    ports:
      - "192.168.1.111:3306:3306"
    volumes:
      - ./files/mysql/init-script.sh:/docker-entrypoint-initdb.d/init-script.sh
      - dbdata:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} --silent
      interval: 1s
      retries: 120

  ###############################################################################
  # Grafana
  grafana:
    container_name: grafana
    image: grafana/grafana:11.5.8
    env_file: .env
    restart: always
    environment:
      - GF_INSTALL_PLUGINS=yesoreyeram-boomtheme-panel,nikosc-percenttrend-panel,briangann-gauge-panel
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=${GF_DEFAULT_HOME_DASHBOARD}
    mem_limit: 256m
    ports:
      - "192.168.1.111:3000:3000"
    volumes:
      - ./files/grafana/etc:/etc/grafana
    healthcheck:
      test: wget --spider -q http://localhost:3000/healthz || exit 1
      interval: 1s
      retries: 120
    depends_on:
      mysql:
        condition: service_healthy

###############################################################################
# MySQL volume
volumes:
  dbdata:
